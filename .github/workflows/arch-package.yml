name: Arch package

# Build the full-featured Arch package (Exiv2 / OpenCV / mpv) and attach it to
# the GitHub release whenever a version tag is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # needed to upload assets to the release

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build tooling
        run: pacman -Syu --noconfirm git git-lfs cmake qt6-base qt6-svg qt6-imageformats qt6-tools pkgconf exiv2 opencv mpv

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags needed for pkgver fallback / git describe
          lfs: true        # fetch real image bytes; LFS pointer stubs in qrc crash at runtime

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create unprivileged build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          # Let the build user own the checkout so makepkg can write src/pkg.
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Compute pkgver from tag
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          # Strip leading 'v' and map '-' to '_' (pacman versions can't contain '-').
          pkgver="$(printf '%s' "$ref" | sed 's/^v//; s/-/_/g')"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "Building pkgver=$pkgver from tag=$ref"

      - name: Build package
        working-directory: packaging/arch
        env:
          THUMBGRID_PKGVER: ${{ steps.ver.outputs.pkgver }}
        run: |
          sudo -u builder --preserve-env=THUMBGRID_PKGVER \
            makepkg -f --noconfirm --nodeps
          ls -al ./*.pkg.tar.zst

      - name: Upload package to the release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: packaging/arch/*.pkg.tar.zst
          fail_on_unmatched_files: true
          generate_release_notes: true
