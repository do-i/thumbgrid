name: Arch package

# Build the full-featured Arch package (Exiv2 / OpenCV / mpv), attach it to
# the GitHub release on version tags, and publish/refresh the pacman repo
# (gh-pages: arch/x86_64/) so `pacman -Syu` picks up the rebuild. Also
# runnable manually (workflow_dispatch) with a bumped pkgrel to republish an
# ABI-only rebuild (e.g. after an Arch mpv/exiv2/opencv/Qt update) without
# cutting a new app version tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pkgrel:
        description: 'pkgrel to publish (bump for an ABI-only rebuild of the latest tag)'
        required: false
        default: '1'

permissions:
  contents: write   # needed to upload release assets and push to gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build tooling
        run: pacman -Syu --noconfirm git git-lfs cmake qt6-base qt6-svg qt6-imageformats qt6-tools pkgconf exiv2 opencv mpv pacman-contrib

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags needed for pkgver fallback / git describe
          lfs: true        # fetch real image bytes; LFS pointer stubs in qrc crash at runtime

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Create unprivileged build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          # Let the build user own the checkout so makepkg can write src/pkg.
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Compute pkgver / pkgrel
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ref="${GITHUB_REF_NAME}"
            pkgrel="1"
          else
            # Manual dispatch (ABI-only rebuild): republish the latest tag
            # with the caller-supplied pkgrel so pacman -Syu sees a bump.
            ref="$(git describe --tags --abbrev=0)"
            pkgrel="${{ github.event.inputs.pkgrel }}"
            pkgrel="${pkgrel:-1}"

            # actions/checkout left the dispatched branch's HEAD checked out,
            # not this tag -- if the branch moved on since the tag, building
            # HEAD would silently ship newer code labeled with the old
            # version. Pin the worktree to the tag before the build step runs.
            git checkout "$ref"
            # LFS smudging only covers the ref actions/checkout originally
            # fetched; without this, image assets under the tag stay LFS
            # pointer stubs and crash the app at runtime (see checkout step).
            git lfs pull
          fi
          # Strip leading 'v' and map '-' to '_' (pacman versions can't contain '-').
          pkgver="$(printf '%s' "$ref" | sed 's/^v//; s/-/_/g')"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$pkgrel" >> "$GITHUB_OUTPUT"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "Building pkgver=$pkgver pkgrel=$pkgrel from ref=$ref"

      - name: Re-chown workspace for builder (dispatch checkout above ran as root)
        if: github.event_name == 'workflow_dispatch'
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build package
        working-directory: packaging/arch
        env:
          THUMBGRID_PKGVER: ${{ steps.ver.outputs.pkgver }}
          THUMBGRID_PKGREL: ${{ steps.ver.outputs.pkgrel }}
        run: |
          sudo -u builder --preserve-env=THUMBGRID_PKGVER,THUMBGRID_PKGREL \
            makepkg -f --noconfirm --nodeps
          ls -al ./*.pkg.tar.zst

      - name: Upload package to the release
        uses: softprops/action-gh-release@v2
        # Also run on workflow_dispatch: an ABI-only rebuild needs its
        # package attached to the existing tag's release too, since the
        # AUR-publish script consumes release assets (multi-srcrel aware).
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          # Explicit tag_name so dispatch runs (whose github.ref is the
          # triggering branch, not the tag) still target the tag's release;
          # this is a no-op on tag-push runs, where it already matches.
          tag_name: ${{ steps.ver.outputs.tag }}
          files: packaging/arch/*.pkg.tar.zst
          fail_on_unmatched_files: true
          # Safe for dispatch too: softprops/action-gh-release does not
          # regenerate notes for a release that already exists.
          generate_release_notes: true

      - name: Publish/refresh pacman repo (gh-pages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          work="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$repo_url" "$work"
          else
            echo "gh-pages branch does not exist yet; creating it."
            git clone "$repo_url" "$work"
            git -C "$work" checkout --orphan gh-pages
            git -C "$work" rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$work/arch/x86_64"
          cp packaging/arch/*.pkg.tar.zst "$work/arch/x86_64/"
          # Keep old package files available, but never let their filename order
          # replace the newest database entry (for example, .7.9 sorts after .7.10).
          (cd "$work/arch/x86_64" && repo-add --prevent-downgrade thumbgrid.db.tar.zst *.pkg.tar.zst)

          cd "$work"
          git add -A
          if git diff --cached --quiet; then
            echo "No pacman repo changes to publish."
          else
            git commit -m "Publish thumbgrid ${{ steps.ver.outputs.pkgver }}-${{ steps.ver.outputs.pkgrel }}"
            git push origin gh-pages
          fi
